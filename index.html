<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Panorama</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0);

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const image_src = [
           'background/panorama_0.png',
           'background/panorama_1.png',
           'background/panorama_2.png',
           'background/panorama_3.png',
           'background/panorama_4.png',
           'background/panorama_5.png',
        ];

        const loader = new THREE.TextureLoader();

        function loadTex(url) {
            const tex = loader.load(url);
            tex.wrapS = THREE.RepeatWrapping;
            tex.repeat.x = -1;   // 水平翻转
            return tex;
        }

        
        const materials = [
            new THREE.MeshBasicMaterial({ map: loadTex(image_src[3]), side: THREE.BackSide }), // 前
            new THREE.MeshBasicMaterial({ map: loadTex(image_src[1]), side: THREE.BackSide }), // 右
            new THREE.MeshBasicMaterial({ map: loadTex(image_src[4]), side: THREE.BackSide }), // 上
            new THREE.MeshBasicMaterial({ map: loadTex(image_src[5]), side: THREE.BackSide }), // 下
            new THREE.MeshBasicMaterial({ map: loadTex(image_src[0]), side: THREE.BackSide }), // 后
            new THREE.MeshBasicMaterial({ map: loadTex(image_src[2]), side: THREE.BackSide })  // 左
        ];

        const geometry = new THREE.BoxGeometry(10, 10, 10);
        const cube = new THREE.Mesh(geometry, materials);
        scene.add(cube);
        
        /* === 3. 鼠标拖拽控制相机 === */
        let isDown = false;
        let startX = 0, startY = 0;
        let lon = 0, lat = 0;          // 经度、纬度（角度）
        const speed = 0.25;             // 灵敏度，可自己调
        
        /* 鼠标事件 */
        document.addEventListener('mousedown',  onStart);
        document.addEventListener('mousemove',  onMove);
        document.addEventListener('mouseup',    onEnd);
        
        /* 触屏事件 */
        document.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {          // 单指
                const t = e.touches[0];
                onStart({ clientX: t.clientX, clientY: t.clientY });
                e.preventDefault();                // 防止页面滚动
            }
        });

        document.addEventListener('touchmove',  e => {
            if (e.touches.length === 1) {
                const t = e.touches[0];
                onMove({ clientX: t.clientX, clientY: t.clientY });
                e.preventDefault();
            }
        });

        document.addEventListener('touchend',   e => { onEnd(); e.preventDefault(); });

        /* 统一处理函数 */
        function onStart(e) {
            isDown = true;
            startX = e.clientX;
            startY = e.clientY;
        }
        function onMove(e) {
            if (!isDown) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            lon -= dx * speed;
            lat += dy * speed;
            lat = Math.max(-85, Math.min(85, lat)); // 限幅
            startX = e.clientX;
            startY = e.clientY;
            updateCamera();
        }
        function onEnd() {
            isDown = false;
        }

        function updateCamera() {
            const phi   = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            const x = 10 * Math.sin(phi) * Math.cos(theta);
            const y = 10 * Math.cos(phi);
            const z = 10 * Math.sin(phi) * Math.sin(theta);
            camera.lookAt(x, y, z);
        }

        function animate() {
            requestAnimationFrame(animate);

            //cube.rotation.y += 0.001;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
